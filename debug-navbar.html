<!DOCTYPE html>
<html>
<head>
    <title>Navbar Debug</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .error { color: red; }
        .success { color: green; }
        .info { color: blue; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>Navbar Debug - Login Button Visibility</h1>
    
    <div class="section">
        <h2>1. Current Session Status</h2>
        <div id="session-check">Checking...</div>
    </div>
    
    <div class="section">
        <h2>2. Session Details</h2>
        <div id="session-details">Checking...</div>
    </div>
    
    <div class="section">
        <h2>3. Login Button Logic</h2>
        <div id="login-logic">Checking...</div>
    </div>
    
    <div class="section">
        <h2>4. Navbar Elements</h2>
        <div id="navbar-check">Checking...</div>
    </div>
    
    <script>
        async function checkSession() {
            try {
                const response = await fetch('/api/auth/session');
                const session = await response.json();
                
                let html = '<pre>' + JSON.stringify(session, null, 2) + '</pre>';
                html += '<p class="' + (session.user ? 'success' : 'info') + '">';
                html += session.user ? 'User is logged in' : 'No active session';
                html += '</p>';
                
                document.getElementById('session-check').innerHTML = html;
                
                // Check login button logic
                const status = session.user ? 'authenticated' : 'unauthenticated';
                const shouldShowLogin = status !== 'authenticated';
                
                document.getElementById('login-logic').innerHTML = `
                    <p><strong>Session Status:</strong> ${status}</p>
                    <p><strong>Should Show Login Button:</strong> ${shouldShowLogin ? 'YES' : 'NO'}</p>
                    <p><strong>Condition:</strong> status !== 'authenticated' = ${shouldShowLogin}</p>
                `;
                
                // Session details
                document.getElementById('session-details').innerHTML = `
                    <p><strong>Session exists:</strong> ${!!session.user}</p>
                    <p><strong>User email:</strong> ${session.user?.email || 'N/A'}</p>
                    <p><strong>User name:</strong> ${session.user?.name || 'N/A'}</p>
                    <p><strong>User ID:</strong> ${session.user?.id || 'N/A'}</p>
                `;
                
            } catch (error) {
                document.getElementById('session-check').innerHTML = '<p class="error">Error: ' + error.message + '</p>';
            }
        }
        
        function checkNavbarElements() {
            // Check if navbar elements exist
            const navbar = document.querySelector('nav');
            const loginButton = document.querySelector('a[href="/login"]');
            const signInButton = Array.from(document.querySelectorAll('button, a')).find(el => 
                el.textContent?.includes('Sign In') || el.textContent?.includes('Login')
            );
            
            let html = '<p><strong>Navbar found:</strong> ' + (navbar ? 'YES' : 'NO') + '</p>';
            html += '<p><strong>Login link found:</strong> ' + (loginButton ? 'YES' : 'NO') + '</p>';
            html += '<p><strong>Sign In button found:</strong> ' + (signInButton ? 'YES' : 'NO') + '</p>';
            
            if (loginButton) {
                html += '<p><strong>Login button visible:</strong> ' + 
                    (loginButton.offsetParent !== null ? 'YES' : 'NO') + '</p>';
                html += '<p><strong>Login button display:</strong> ' + 
                    window.getComputedStyle(loginButton).display + '</p>';
            }
            
            document.getElementById('navbar-check').innerHTML = html;
        }
        
        // Run checks
        checkSession();
        setTimeout(checkNavbarElements, 1000);
        
        // Auto-refresh every 3 seconds
        setInterval(() => {
            checkSession();
            checkNavbarElements();
        }, 3000);
    </script>
</body>
</html>
