<!DOCTYPE html>
<html>
<head>
    <title>Google OAuth Debug</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .error { color: red; }
        .success { color: green; }
        .info { color: blue; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 3px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Google OAuth Comprehensive Debug</h1>
    
    <div class="section">
        <h2>1. Environment Variables</h2>
        <div id="env-check">Checking...</div>
    </div>
    
    <div class="section">
        <h2>2. NextAuth Providers</h2>
        <div id="providers-check">Checking...</div>
    </div>
    
    <div class="section">
        <h2>3. Current Session</h2>
        <div id="session-check">Checking...</div>
    </div>
    
    <div class="section">
        <h2>4. Browser Cookies</h2>
        <div id="cookies-check">Checking...</div>
    </div>
    
    <div class="section">
        <h2>5. Test Google OAuth Flow</h2>
        <button onclick="testGoogleOAuth()">Test Google OAuth</button>
        <div id="oauth-test"></div>
    </div>
    
    <script>
        async function checkEnvironment() {
            try {
                const response = await fetch('/api/debug/env');
                const env = await response.json();
                
                let html = '<pre>' + JSON.stringify(env, null, 2) + '</pre>';
                html += '<p class="' + (env.NEXTAUTH_URL && env.GOOGLE_CLIENT_ID ? 'success' : 'error') + '">';
                html += env.NEXTAUTH_URL && env.GOOGLE_CLIENT_ID ? 'Environment variables OK' : 'Missing environment variables';
                html += '</p>';
                
                document.getElementById('env-check').innerHTML = html;
            } catch (error) {
                document.getElementById('env-check').innerHTML = '<p class="error">Error: ' + error.message + '</p>';
            }
        }
        
        async function checkProviders() {
            try {
                const response = await fetch('/api/auth/providers');
                const providers = await response.json();
                
                let html = '<pre>' + JSON.stringify(providers, null, 2) + '</pre>';
                html += '<p class="' + (providers.google ? 'success' : 'error') + '">';
                html += providers.google ? 'Google provider available' : 'Google provider NOT available';
                html += '</p>';
                
                document.getElementById('providers-check').innerHTML = html;
            } catch (error) {
                document.getElementById('providers-check').innerHTML = '<p class="error">Error: ' + error.message + '</p>';
            }
        }
        
        async function checkSession() {
            try {
                const response = await fetch('/api/auth/session');
                const session = await response.json();
                
                let html = '<pre>' + JSON.stringify(session, null, 2) + '</pre>';
                html += '<p class="' + (session.user ? 'success' : 'info') + '">';
                html += session.user ? 'User logged in' : 'No active session';
                html += '</p>';
                
                document.getElementById('session-check').innerHTML = html;
            } catch (error) {
                document.getElementById('session-check').innerHTML = '<p class="error">Error: ' + error.message + '</p>';
            }
        }
        
        function checkCookies() {
            const cookies = document.cookie.split(';').map(c => c.trim());
            const authCookies = cookies.filter(c => c.includes('next-auth') || c.includes('auth'));
            
            let html = '<p><strong>Total cookies:</strong> ' + cookies.length + '</p>';
            html += '<p><strong>Auth cookies:</strong> ' + authCookies.length + '</p>';
            html += '<pre>' + JSON.stringify(authCookies, null, 2) + '</pre>';
            html += '<p class="' + (authCookies.length > 0 ? 'success' : 'info') + '">';
            html += authCookies.length > 0 ? 'Auth cookies found' : 'No auth cookies';
            html += '</p>';
            
            document.getElementById('cookies-check').innerHTML = html;
        }
        
        function testGoogleOAuth() {
            const testDiv = document.getElementById('oauth-test');
            testDiv.innerHTML = '<p class="info">Testing Google OAuth...</p>';
            
            // Open Google OAuth in new window to test
            const width = 500;
            const height = 600;
            const left = (screen.width - width) / 2;
            const top = (screen.height - height) / 2;
            
            const oauthWindow = window.open(
                '/api/auth/signin/google',
                'google_oauth',
                `width=${width},height=${height},left=${left},top=${top}`
            );
            
            // Monitor the window
            const checkClosed = setInterval(() => {
                if (oauthWindow.closed) {
                    clearInterval(checkClosed);
                    testDiv.innerHTML = '<p class="info">OAuth window closed. Checking session...</p>';
                    setTimeout(checkSession, 1000);
                }
            }, 1000);
        }
        
        // Run all checks
        checkEnvironment();
        checkProviders();
        checkSession();
        checkCookies();
        
        // Auto-refresh session every 5 seconds
        setInterval(checkSession, 5000);
    </script>
</body>
</html>
