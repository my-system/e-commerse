<!DOCTYPE html>
<html>
<head>
    <title>Test Environment Variables</title>
</head>
<body>
    <h1>Testing Environment Variables...</h1>
    <div id="results"></div>
    
    <script>
        fetch('/api/debug/env')
            .then(response => response.json())
            .then(env => {
                const results = document.getElementById('results');
                results.innerHTML = `
                    <h2>Environment Variables:</h2>
                    <p><strong>NEXTAUTH_URL:</strong> ${env.NEXTAUTH_URL}</p>
                    <p><strong>NEXTAUTH_SECRET:</strong> ${env.NEXTAUTH_SECRET}</p>
                    <p><strong>GOOGLE_CLIENT_ID:</strong> ${env.GOOGLE_CLIENT_ID}</p>
                    <p><strong>GOOGLE_CLIENT_SECRET:</strong> ${env.GOOGLE_CLIENT_SECRET}</p>
                    <p><strong>NODE_ENV:</strong> ${env.NODE_ENV}</p>
                    <hr>
                    <p><strong>Status:</strong> ${env.NEXTAUTH_URL && env.GOOGLE_CLIENT_ID ? 'READY FOR GOOGLE OAUTH' : 'MISSING CONFIGURATION'}</p>
                `;
            })
            .catch(error => {
                document.getElementById('results').innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            });
    </script>
</body>
</html>
