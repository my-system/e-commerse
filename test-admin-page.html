<!DOCTYPE html>
<html>
<head>
    <title>Test Admin Page</title>
</head>
<body>
    <h1>Test Admin Database Page</h1>
    <button onclick="testAPI()">Test API</button>
    <div id="result"></div>
    
    <script>
        async function testAPI() {
            try {
                console.log('Testing API...');
                const response = await fetch('/api/pending-products');
                const data = await response.json();
                
                console.log('Response:', data);
                
                const resultDiv = document.getElementById('result');
                resultDiv.innerHTML = `
                    <h2>API Response:</h2>
                    <p>Status: ${response.status}</p>
                    <p>Success: ${data.success}</p>
                    <p>Products: ${data.products ? data.products.length : 0}</p>
                    <ul>
                        ${data.products ? data.products.map(p => `<li>${p.title} (${p.status})</li>`).join('') : ''}
                    </ul>
                `;
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('result').innerHTML = `<p>Error: ${error.message}</p>`;
            }
        }
        
        // Test on load
        window.onload = testAPI;
    </script>
</body>
</html>
